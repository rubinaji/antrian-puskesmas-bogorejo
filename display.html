<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display Antrian Puskesmas Bogorejo</title>
<style>
body{font-family:Arial,sans-serif;background:#0f766e;color:white;text-align:center;padding:30px;}
.container{max-width:1200px;margin:auto;}
.card{background:white;color:#0f766e;border-radius:20px;padding:30px;margin-bottom:20px;}
.nama{font-size:60px;font-weight:bold;}
.klaster{font-size:35px;margin-top:20px;}
.persiapan{background:#134e4a;border-radius:20px;padding:20px;}
.item{font-size:28px;padding:10px;}
</style>
</head>
<body>
<div class="container">
<h1>DISPLAY ANTRIAN PUSKESMAS BOGOREJO</h1>
<div class="card">
<h2>SEDANG DIPANGGIL</h2>
<div class="nama" id="nama">MENUNGGU...</div>
<div id="desa"></div>
<div class="klaster" id="klaster">-</div>
</div>
<div class="persiapan">
<h2>PERSIAPAN BERIKUTNYA</h2>
<div id="persiapan">Daftar persiapan dapat ditambahkan nanti.</div>
</div>
</div>
<script>
const urlParams=new URLSearchParams(window.location.search);
const filterKlaster=urlParams.get("klaster");

function updateDisplay(){
 const data=JSON.parse(localStorage.getItem("sedangDipanggil"));
 if(data && (!filterKlaster || data.klaster===filterKlaster)){
   document.getElementById("nama").innerHTML=data.sapaan+" "+data.nama;
   document.getElementById("desa").innerHTML="Desa : "+data.desa;
   document.getElementById("klaster").innerHTML=data.klaster;
 }
}
setInterval(updateDisplay,1000);
updateDisplay();
</script>
</body>
</html>
