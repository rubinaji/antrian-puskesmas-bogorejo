<script>

const API_URL="https://script.google.com/macros/s/AKfycbxLl2vDi0k4HJzaDCJXzTl0NynMjcVWvgVuz0G1a9tchMueFwgzdB4zncmKeTLX9iIn9w/exec";

async function tampilkanPasien(){

    const klaster=document.getElementById("filterKlaster").value;

    if(klaster==""){
        return;
    }

    const daftar=document.getElementById("daftarPasien");

    try{

        const response=await fetch(API_URL);
        const pasien=await response.json();

        const hasil=pasien.filter(
            p =>
            p.Klaster===klaster &&
            p.Status!=="selesai"
        );

        document.getElementById(
            "jumlahPasien"
        ).innerHTML=hasil.length;

        daftar.innerHTML="";

        if(hasil.length===0){

            daftar.innerHTML=
            "<h2>Tidak ada pasien menunggu</h2>";

            return;
        }

        hasil.forEach((p)=>{

            daftar.innerHTML += `
            <div class="card">

                <h2>${p.Sapaan} ${p.Nama}</h2>

                <p><b>Desa :</b> ${p.Desa}</p>

                <p><b>Status :</b> ${p.Status}</p>

                <button class="panggil"
                onclick='panggil(
                "${p.Sapaan}",
                "${p.Nama}",
                "${p.Desa}",
                "${p.Klaster}"
                )'>
                🔊 Panggil
                </button>

                <button class="ulangi"
                onclick='ulangi(
                "${p.Sapaan}",
                "${p.Nama}",
                "${p.Desa}",
                "${p.Klaster}"
                )'>
                🔁 Ulangi
                </button>

                <button class="selesai"
                onclick='selesai(
                "${p.Sapaan}",
                "${p.Nama}",
                "${p.Desa}",
                "${p.Klaster}"
                )'>
                ✅ Selesai
                </button>

            </div>
            `;
        });

    }
    catch(error){

        daftar.innerHTML=
        "<h2>Gagal mengambil data</h2>";

        console.log(error);

    }

}

function panggil(
sapaan,
nama,
desa,
klaster){

    const data={
        sapaan:sapaan,
        nama:nama,
        desa:desa,
        klaster:klaster
    };

    localStorage.setItem(
        "sedangDipanggil",
        JSON.stringify(data)
    );

    document.getElementById(
        "sedangDipanggil"
    ).innerHTML=
    `
    <h2>${sapaan} ${nama}</h2>
    <p>${desa}</p>
    <p>${klaster}</p>
    `;

    const suara = new SpeechSynthesisUtterance(
        sapaan + " " +
        nama +
        ", dari desa " +
        desa +
        ", dipersilakan menuju " +
        klaster +
        ". Terima kasih."
    );

    suara.lang="id-ID";
    suara.rate=0.85;
    suara.pitch=1;
    suara.volume=1;

    const voices =
    speechSynthesis.getVoices();

    const voiceIndonesia =
    voices.find(
        v=>v.lang.includes("id")
    );

    if(voiceIndonesia){
        suara.voice=
        voiceIndonesia;
    }

    speechSynthesis.cancel();
    speechSynthesis.speak(suara);
}

function ulangi(
sapaan,
nama,
desa,
klaster){

    panggil(
        sapaan,
        nama,
        desa,
        klaster
    );
}

function ulangiTerakhir(){

    const data=
    JSON.parse(
        localStorage.getItem(
            "sedangDipanggil"
        )
    );

    if(!data){

        alert(
        "Belum ada pasien dipanggil."
        );

        return;
    }

    panggil(
        data.sapaan,
        data.nama,
        data.desa,
        data.klaster
    );
}

async function selesai(
sapaan,
nama,
desa,
klaster){

    if(
        !confirm(
            "Selesaikan pelayanan untuk "
            + nama + " ?"
        )
    ){
        return;
    }

    try{

        await fetch(
            API_URL,
            {
                method:"POST",
                body:JSON.stringify({
                    action:"selesai",
                    sapaan:sapaan,
                    nama:nama,
                    desa:desa,
                    klaster:klaster
                })
            }
        );

        tampilkanPasien();

    }
    catch(error){

        alert(
        "Gagal mengubah status."
        );

        console.log(error);

    }
}

setInterval(function(){

    const klaster=
    document.getElementById(
        "filterKlaster"
    ).value;

    if(klaster!=""){
        tampilkanPasien();
    }

},120000);

</script>
